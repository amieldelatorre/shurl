<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Sign up</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/_/shared.css">
    <link rel="stylesheet" href="/_/signup/signup.css">
</head>

<body>
    <div id="notification-container"></div>
    <div class="main">
        <header class="header">
            <h1 class="logo">Shurl</h1>
        </header>
        <div class="content">
            <form id="signup-form" class="signup-form">
                <h2>Sign up</h2>
                <input 
                    id="email" 
                    type="email" 
                    placeholder="me@example.invalid" 
                    autocomplete="email"
                    required 
                />
                <input 
                    id="username" 
                    placeholder="username" 
                    autocomplete="username"
                    title="Username needs to have at least 3 characters, lowercase letters and numbers only"
                    pattern="[a-z0-9]{3,}"
                    minlength="3" 
                    required 
                />
                <input 
                    id="password" 
                    type="password" 
                    placeholder="password" 
                    minlength="8"
                    required 
                />
                <input 
                    id="confirmpassword"
                    type="password" 
                    placeholder="confirm password" 
                    required 
                    minlength="8"
                />
                <button class="signup-submit" type="submit">
                    Sign up
                </button>
                <p>Already have an account? <a href="/_/login">Log in</a></p>
            </form>
        </div><!--End of div classcontent-->
    </div><!--End of div class main-->
    <script type="module" src="/_/shared.js"></script>
    <script type="module" src="/_/signup/signup.js"></script>
</body>

</html>
