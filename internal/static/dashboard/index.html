<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/_/shared.css">
    <link rel="stylesheet" href="/_/dashboard/dashboard.css">
</head>

<body>
    <div id="page-loading" hidden>
        <span class="spinner"></span>
    </div>
    <div id="info-banner"></div>
    <div id="notification-container"></div>
    <div class="main">
        <nav>
            <div class="nav-top">
                <h1 id="nav-logo" class="logo">Shurl</h1>
                <div id="nav-items" class="nav-items">
                    <button class="nav-item">Profile</button>
                </div><!--End of div class nav-items-->
            </div><!--End of div class nav-top-->

            <button id="logout-button" class="nav-item">Logout</button>
        </nav>
        <div class="content">
            <fieldset class="create-short-url-form-wrapper">
                <legend>Create Short Url</legend>
                <form id="create-short-url" class="create-short-url">
                    <input 
                        id="url-input" 
                        type="url" 
                        placeholder="https://yoururl.com/here"
                        required
                    />
                    <input 
                        id="url-ttl"
                        class="url-ttl"
                        type="number"
                        value="7"
                        size="3"
                        required
                    />
                    <select id="ttl-units" class="ttl-units"> <!--value here is how many seconds for each unit-->
                        <option value="60">Minute(s)</option>
                        <option value="3600">Hour(s)</option>
                        <option value="86400" selected>Day(s)</option>
                        <option value="604800">Week(s)</option>
                        <option value="18144000">Months(s)</option> <!--counted as 30 days-->
                    </select>
                    <button class="create-short-url-submit-button" type="submit">
                        Submit
                    </button>
                </form>
                <div id="success-links">
                </div><!--End of div id success-links-->
            </fieldset>

            <div id="short-urls" class="short-urls">
                <h2>Short URLs</h2>
                <div class="top-table-nav table-nav">
                    <button class="top-table-nav-previous-button table-nav-previous-button">Previous</button>
                    <p class="top-table-nav-short-urls-counter short-urls-counter"></p>
                    <button class="top-table-nav-next-button table-nav-next-button">Next</button>
                </div><!--End of div class top-table-nav -->
                <table id="short-urls-table" class="short-urls-table">
                    <thead id="short-urls-table-heading"></thead>
                    <tbody id="short-urls-table-body"></tbody>
                </table>
                <div class="bottom-table-nav table-nav">
                    <button class="bottom-table-nav-previous-button table-nav-previous-button">Previous</button>
                    <p class="bottom-table-nav-short-urls-counter short-urls-counter"></p>
                    <button class="bottom-table-nav-next-button table-nav-next-button">Next</button>
                </div><!--End of div class bottom-table-nav -->
            </div>
        </div><!--End of div classcontent-->
    </div><!--End of div class main-->
    <script type="module" src="/_/shared.js"></script>
    <script type="module" src="/_/dashboard/dashboard.js"></script>
</body>

</html>
