<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/_/shared.css">
    <link rel="stylesheet" href="/_/login/login.css">
</head>

<body>
    <div id="info-banner"></div>
    <div id="notification-container"></div>
    <div class="main">
        <header class="header">
            <h1 class="logo">Shurl</h1>
        </header>
        <div class="content">
            <form id="login-form" class="login-form">
                <h2>Login</h2>
                <input 
                    id="email" 
                    type="email" 
                    placeholder="me@example.invalid" 
                    autocomplete="email"
                    required 
                />
                <input 
                    id="password" 
                    type="password" 
                    placeholder="password" 
                    minlength="8"
                    required 
                />
                <button class="login-submit" type="submit">
                    Log in
                </button>
                <p>Don't have an account? <a href="/_/signup">Sign up</a></p>
            </form>
        </div><!--End of div classcontent-->
    </div><!--End of div class main-->
    <script type="module" src="/_/shared.js"></script>
    <script type="module" src="/_/login/login.js"></script>
</body>

</html>
