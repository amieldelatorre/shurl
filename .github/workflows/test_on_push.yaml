name: Test on push

on:
  push:
    branches:
      - '**'
      - '!releases/**'
      - '!release/**'
    tags-ignore:
      - '**'
  pull_request:
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.26.x']
  
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}

      # - name: Lint # use golangci-lint

      - name: Download Dependencies
        run: |
          go mod download

      - name: Run Tests
        run: |
          go test ./... -v
