name: Test on push

on:
  push:
    branches:
      - '**'
      - '!releases/**'
      - '!release/**'
    tags-ignore:
      - '**'
  pull_request:
  workflow_call:

jobs:
  test:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.26.x']
  
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9

      - name: Download Dependencies
        run: |
          go mod download
      
      - name: Build with race checking
        run: |
          go build -race .

      - name: Test sql test script is Ok
        run: |
          make validatetestdata

      - name: Run Tests
        run: |
          make test
