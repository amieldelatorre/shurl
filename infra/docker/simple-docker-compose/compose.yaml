networks:
  backend:
    driver: bridge

services:
##################################### PostgreSQL #####################################
  postgresql:
    image: postgres:18.3
    restart: unless-stopped
    container_name: postgresql
    security_opt:
      - "no-new-privileges:true"
    networks:
      - backend
    ports:
      - 5432:5432
    volumes:
      - ./.docker_data/postgres:/var/lib/postgresql
    environment:
      POSTGRES_PASSWORD: ${SHURL_DATABASE_PASSWORD:?}
      POSTGRES_USER: shurl
      POSTGRES_DB: shurl
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d shurl -U shurl"]
      start_period: 10s
      interval: 30s
      retries: 3
      timeout: 5s

##################################### Valkey #####################################
  valkey:
    image: valkey/valkey:9.0.3
    restart: unless-stopped
    container_name: valkey
    security_opt:
      - "no-new-privileges:true"
    command:
      - "valkey-server"
      - "--maxmemory"
      - "100mb"
      - "--maxmemory-policy"
      - "allkeys-lru"
      - "--save"
      - ""
    networks:
      - backend
    ports:
      - 6379:6379
    healthcheck:
      test: ["CMD-SHELL", "valkey-cli ping | grep PONG"]
      start_period: 10s
      interval: 30s
      retries: 3
      timeout: 5s

##################################### Shurl #####################################
  shurl:
    image: ghcr.io/amieldelatorre/shurl:0.0.11
    restart: unless-stopped
    container_name: shurl
    security_opt:
      - "no-new-privileges:true"
    command:
      - "shurl"
      - "run"
      - "-f"
      - "/shurl/shurl.yaml"
    networks:
      - backend
    ports:
      - 8080:8080
    environment:
      DATABASE_PASSWORD: ${SHURL_DATABASE_PASSWORD:?}
      SERVER_AUTH_JWT_KEY: ${SHURL_SERVER_AUTH_JWT_KEY:?}
    volumes:
      - ./shurl.yaml:/shurl/shurl.yaml:ro
    depends_on:
      postgresql:
        condition: service_healthy
      valkey:
        condition: service_healthy